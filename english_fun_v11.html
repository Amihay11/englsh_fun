<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>אנגלית בכיף 🇺🇸</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Rubik',sans-serif;background:#f0f0ff;direction:rtl;overflow-x:hidden;min-height:100vh;-webkit-tap-highlight-color:transparent;}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
.sc{display:none;flex-direction:column;flex:1;}.sc.on{display:flex;}
@keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.25)}80%{transform:scale(.92)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes slideDown{0%{transform:translateY(-20px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes xpFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(1.4);opacity:0}}
@keyframes nodeGlow{0%,100%{box-shadow:0 4px 14px rgba(88,56,250,.3)}50%{box-shadow:0 4px 24px rgba(88,56,250,.7),0 0 0 6px rgba(88,56,250,.15)}}
@keyframes reviewPulse{0%,100%{box-shadow:0 4px 14px rgba(255,170,0,.3)}50%{box-shadow:0 4px 24px rgba(255,170,0,.6),0 0 0 6px rgba(255,170,0,.15)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideRight{0%{transform:translateX(40px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes flipCard{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
@keyframes achPop{0%{transform:scale(0) translateY(40px);opacity:0}60%{transform:scale(1.15) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}
.anim-bounceIn{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both;}
.anim-slideUp{animation:slideUp .35s ease both;}
.anim-shake{animation:shake .4s ease both;}
.anim-fadeIn{animation:fadeIn .4s ease both;}

/* PROFILE */
.prof-bg{flex:1;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px;position:relative;overflow:hidden;}
.prof-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,rgba(88,56,250,.25) 0%,transparent 60%),radial-gradient(circle at 70% 30%,rgba(194,24,91,.2) 0%,transparent 50%);pointer-events:none;}
.prof-logo{font-size:32px;font-weight:900;color:white;text-align:center;letter-spacing:-1px;text-shadow:0 2px 20px rgba(88,56,250,.5);}
.prof-logo-flag{font-size:36px;}
.prof-sub{font-size:13px;color:rgba(255,255,255,.65);text-align:center;}
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;z-index:1;}
.prof-card{background:rgba(255,255,255,.08);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.18);border-radius:22px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .25s;animation:slideUp .4s ease both;}
.prof-card:nth-child(2){animation-delay:.08s;}.prof-card:nth-child(3){animation-delay:.16s;}
.prof-card:active{background:rgba(255,255,255,.16);transform:translateY(-3px);}
.prof-card.add{border-style:dashed;opacity:.6;}
.prof-av{font-size:42px;line-height:1;}.prof-name{font-size:15px;font-weight:700;color:white;}
.prof-stats{font-size:11px;color:rgba(255,255,255,.6);text-align:center;line-height:1.5;}
.prof-del{font-size:10px;color:rgba(255,255,255,.4);cursor:pointer;text-decoration:underline;margin-top:2px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
.modal{background:white;border-radius:28px;padding:26px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;box-shadow:0 24px 60px rgba(0,0,0,.25);animation:bounceIn .4s ease;}
.modal-title{font-size:20px;font-weight:700;color:#1a1a2e;text-align:center;}
.av-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.av-opt{font-size:28px;cursor:pointer;padding:7px;border-radius:14px;border:2.5px solid transparent;transition:all .15s;}
.av-opt.sel{border-color:#5838fa;background:#f0eeff;transform:scale(1.1);}
.modal-input{border:2.5px solid #ede7f6;border-radius:14px;padding:11px 16px;font-size:15px;font-family:'Rubik',sans-serif;direction:rtl;width:100%;outline:none;}
.modal-input:focus{border-color:#5838fa;}
.modal-btns{display:flex;gap:10px;}
.modal-btn{flex:1;padding:12px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;}
.modal-btn.ok{background:#5838fa;color:white;}.modal-btn.cn{background:#f0f0f0;color:#666;}

/* HOME */
.home-hdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;padding:16px 18px 14px;position:relative;overflow:hidden;}
.home-hdr::after{content:'';position:absolute;bottom:-20px;left:-20px;right:-20px;height:40px;background:#f0f0ff;border-radius:50%;z-index:1;}
.home-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.home-logo{font-size:20px;font-weight:900;letter-spacing:-.5px;}
.home-top-btns{display:flex;align-items:center;gap:8px;}
.home-gear{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;}
.home-gear:active{background:rgba(255,255,255,.25);}
.home-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:22px;padding:6px 14px 6px 7px;cursor:pointer;}
.home-user-av{font-size:20px;}.home-user-name{font-size:13px;font-weight:700;}
.xp-bar-wrap{margin-bottom:10px;}
.xp-labels{display:flex;justify-content:space-between;font-size:11px;opacity:.75;margin-bottom:5px;}
.xp-track{background:rgba(255,255,255,.15);border-radius:10px;height:10px;overflow:hidden;}
.xp-fill{background:linear-gradient(90deg,#ffd600,#ffaa00);border-radius:10px;height:100%;transition:width .8s cubic-bezier(.34,1.56,.64,1);}
.stats-row{display:flex;gap:7px;flex-wrap:wrap;}
.stat-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:5px 11px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;}
.daily-banner{background:linear-gradient(135deg,#ff9800,#f57c00);margin:12px 16px 0;border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 16px rgba(255,152,0,.3);position:relative;z-index:2;animation:slideUp .4s ease both;}
.daily-banner-em{font-size:32px;}.daily-banner-body{flex:1;color:white;}
.daily-banner-title{font-size:14px;font-weight:900;}.daily-banner-sub{font-size:11px;opacity:.8;margin-top:2px;}
.daily-banner-xp{background:rgba(255,255,255,.25);border-radius:14px;padding:6px 14px;font-size:13px;font-weight:900;color:white;}
.daily-banner.done{background:linear-gradient(135deg,#4caf50,#388e3c);opacity:.7;cursor:default;}

.path-wrap{flex:1;overflow-y:auto;padding:20px 0 90px;scroll-behavior:smooth;}
.grp-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px 6px;}
.grp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.grp-title{font-size:13px;font-weight:700;color:#999;}
.grp-line{flex:1;height:1.5px;background:#e8e0f0;}
.path-nodes{display:flex;flex-direction:column;align-items:center;gap:0;padding:6px 0 10px;}
.node{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:6px 8px;position:relative;transition:transform .2s;}
.node:active{transform:scale(1.05);}
.node:nth-child(odd){margin-right:90px;}.node:nth-child(even){margin-left:90px;}
.node-circle{width:70px;height:70px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
.node-big{font-size:26px;font-weight:900;line-height:1;color:white;text-shadow:0 2px 4px rgba(0,0,0,.2);}
.node-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.85);}
.node-name{font-size:10px;font-weight:700;margin-top:4px;text-align:center;max-width:84px;line-height:1.4;color:#444;}
.node-phon{font-size:9px;color:#9c27b0;margin-top:1px;text-align:center;max-width:84px;}
.node-stars{font-size:10px;margin-top:3px;letter-spacing:1px;}
.node-lock{position:absolute;bottom:-2px;right:-2px;background:#bbb;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.node-review{position:absolute;top:-4px;left:-4px;background:#ff9800;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;box-shadow:0 2px 6px rgba(255,152,0,.4);color:white;font-weight:900;}
.n-done .node-circle{background:linear-gradient(135deg,#58cc02,#36a001);box-shadow:0 6px 16px rgba(88,204,2,.35);}
.n-done .node-name{color:#36a001;font-weight:800;}
.n-review .node-circle{background:linear-gradient(135deg,#ff9800,#f57c00);box-shadow:0 6px 16px rgba(255,152,0,.35);animation:reviewPulse 2s ease infinite;}
.n-active .node-circle{background:linear-gradient(135deg,#5838fa,#7c3aed);box-shadow:0 6px 16px rgba(88,56,250,.4);animation:nodeGlow 2s ease infinite;}
.n-active .node-name{color:#5838fa;font-weight:900;}
.n-locked .node-circle{background:linear-gradient(135deg,#d1d5db,#9ca3af);cursor:not-allowed;}
.n-locked .node-big{color:rgba(255,255,255,.6);}
.n-locked .node-name,.n-locked .node-phon{color:#ccc;}

.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid #eee;display:flex;padding:8px 0 env(safe-area-inset-bottom,14px);z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#bbb;font-size:10px;font-weight:700;transition:all .2s;}
.bn.on{color:#5838fa;}.bn.on .bn-icon{transform:scale(1.15);}
.bn-icon{font-size:23px;transition:transform .2s;}

/* LESSON */
.les-hdr{background:white;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1.5px solid #f0f0ff;}
.exit-btn{background:#f5f5ff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;flex-shrink:0;}
.les-info{flex:1;}.les-title{font-size:15px;font-weight:700;color:#1a1a2e;line-height:1.3;}.les-step{font-size:11px;color:#aaa;margin-top:2px;}
.hearts{font-size:16px;letter-spacing:1px;}
.prog-bar-wrap{padding:0 0 2px;background:white;}.prog-bar{height:8px;background:#f0f0ff;border-radius:0 0 4px 4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#5838fa,#a855f7);transition:width .5s cubic-bezier(.34,1.56,.64,1);border-radius:0 4px 4px 0;}
.les-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:13px;padding-bottom:30px;background:#f8f8ff;}
.card{background:white;border-radius:22px;padding:20px;box-shadow:0 2px 16px rgba(88,56,250,.07);border:1.5px solid #f0eeff;}
.card.center{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.card.intro-card{border:2px solid #e8e0ff;background:linear-gradient(160deg,white,#faf8ff);}
.letter-hero{display:flex;gap:20px;align-items:flex-end;justify-content:center;padding:8px 0;}
.lh-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.lh-upper{font-size:96px;font-weight:900;color:#5838fa;line-height:1;cursor:pointer;filter:drop-shadow(0 4px 12px rgba(88,56,250,.2));}
.lh-upper:active{transform:scale(.93);}
.lh-lower{font-size:64px;font-weight:700;color:#a855f7;line-height:1.15;}
.lh-tag{font-size:11px;color:#bbb;font-weight:500;background:#f5f5ff;border-radius:10px;padding:2px 10px;}
.sound-box{background:linear-gradient(135deg,#f0eeff,#fce4ec);border-radius:16px;padding:14px 18px;width:100%;border:1.5px solid #e8d5ff;}
.sound-big{font-size:20px;font-weight:700;color:#5838fa;}.sound-desc{font-size:13px;color:#666;line-height:1.5;margin-top:4px;}
.word-card{border-radius:18px;padding:16px;display:flex;gap:14px;align-items:center;cursor:pointer;border:2px solid transparent;background:linear-gradient(135deg,#f8f4ff,#fff);}
.word-card:active{border-color:#a855f7;}
.wc-em{font-size:44px;flex-shrink:0;}.wc-body{flex:1;text-align:right;}
.wc-en{font-size:22px;font-weight:700;color:#1a1a2e;direction:ltr;text-align:left;}
.wc-phon{font-size:14px;color:#a855f7;font-weight:600;margin-top:3px;}.wc-he{font-size:13px;color:#888;margin-top:2px;}
.wc-spk{font-size:26px;opacity:.35;flex-shrink:0;}
.note-box{font-size:13px;color:#666;background:#f8f6ff;border:1.5px solid #e8d5ff;border-radius:14px;padding:11px 14px;width:100%;line-height:1.6;}
.listen-item{display:flex;align-items:center;gap:13px;background:white;border-radius:16px;padding:13px 16px;cursor:pointer;border:2px solid #f0eeff;box-shadow:0 2px 8px rgba(88,56,250,.05);}
.listen-item:active{border-color:#a855f7;background:#faf8ff;}
.li-em{font-size:32px;flex-shrink:0;}.li-body{flex:1;}.li-en{font-size:17px;font-weight:700;color:#1a1a2e;direction:ltr;text-align:left;}
.li-phon{font-size:13px;color:#a855f7;font-weight:600;margin-top:2px;}.li-he{font-size:12px;color:#aaa;margin-top:1px;}.li-spk{font-size:22px;opacity:.3;}
.mcq-prompt{font-size:16px;font-weight:700;color:#1a1a2e;text-align:center;line-height:1.5;}
.mcq-disp{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 0;}
.mcq-disp-em{font-size:58px;line-height:1;}.mcq-disp-word{font-size:20px;font-weight:700;color:#1a1a2e;direction:ltr;}
.mcq-disp-phon{font-size:14px;color:#a855f7;font-weight:600;}.mcq-disp-he{font-size:13px;color:#888;}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mcq-opt{padding:14px 8px;border:2.5px solid #e8e8f8;border-radius:16px;font-size:13px;font-weight:700;color:#1a1a2e;background:white;cursor:pointer;text-align:center;font-family:'Rubik',sans-serif;box-shadow:0 3px 0 #e0e0f0;transition:all .15s;}
.mcq-opt:active:not(:disabled){transform:translateY(1px);box-shadow:0 1px 0 #d8c5ff;}
.mcq-opt.ok{border-color:#58cc02;background:#f0fff0;color:#36a001;box-shadow:0 3px 0 #48b800;animation:bounceIn .4s ease;}
.mcq-opt.no{border-color:#ff4b4b;background:#fff0f0;color:#cc0000;animation:shake .4s ease;}
.opt-letter{font-size:30px;font-weight:900;display:block;}.opt-phon{font-size:11px;color:#a855f7;display:block;margin-top:2px;}
.opt-en{font-size:13px;font-weight:700;display:block;direction:ltr;}.opt-he{font-size:11px;color:#888;display:block;}
.write-target-big{font-size:104px;font-weight:900;color:#5838fa;line-height:1;cursor:pointer;filter:drop-shadow(0 4px 12px rgba(88,56,250,.2));}
.write-target-big:active{transform:scale(.93);}
.write-guide{font-size:13px;color:#888;text-align:center;line-height:1.6;background:#f8f6ff;border-radius:12px;padding:8px 14px;width:100%;}
.write-input-row{display:flex;gap:10px;align-items:center;width:100%;}
.write-input{flex:1;border:3px solid #e8e0ff;border-radius:16px;padding:13px 16px;font-size:28px;font-weight:700;font-family:'Rubik',sans-serif;text-align:center;outline:none;direction:ltr;unicode-bidi:plaintext;letter-spacing:6px;background:white;transition:all .25s;}
.write-input:focus{border-color:#a855f7;box-shadow:0 0 0 4px rgba(168,85,247,.1);}
.write-input.ok-inp{border-color:#58cc02;background:#f0fff0;color:#36a001;animation:bounceIn .4s ease;}
.write-input.no-inp{border-color:#ff4b4b;background:#fff0f0;animation:shake .3s ease;}
.write-check-btn{padding:13px 18px;background:#5838fa;color:white;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;box-shadow:0 4px 0 #3a24c4;}
.write-check-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #3a24c4;}
.write-hint{font-size:13px;color:#888;text-align:center;}.write-attempts{font-size:12px;color:#ff4b4b;font-weight:700;text-align:center;min-height:18px;}
.write-letter-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.write-letter-slot{width:44px;height:48px;border:2.5px solid #e0e0f8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;direction:ltr;background:white;}
.write-letter-slot.done{border-color:#58cc02;background:#f0fff0;color:#36a001;animation:popIn .3s ease;}
.write-letter-slot.cur{border-color:#a855f7;background:#f8f4ff;box-shadow:0 0 0 3px rgba(168,85,247,.15);}
.write-letter-slot.wrong{border-color:#ff4b4b;background:#fff0f0;color:#ff4b4b;animation:shake .3s ease;}
.sent-card{background:linear-gradient(145deg,#faf4ff,#fff4fc);border-radius:22px;padding:20px;display:flex;flex-direction:column;gap:13px;border:2px solid #e8c8f8;box-shadow:0 4px 20px rgba(168,85,247,.1);}
.sent-label{font-size:12px;font-weight:700;color:#a855f7;letter-spacing:.5px;}
.sent-full{font-size:18px;font-weight:700;color:#1a1a2e;direction:ltr;text-align:left;line-height:1.7;}
.sent-blank{color:#a855f7;font-weight:900;border-bottom:3px solid #a855f7;padding:0 4px;}
.sent-phon{font-size:13px;color:#a855f7;font-weight:600;}.sent-he{font-size:14px;color:#555;}
.sent-choices{display:flex;flex-wrap:wrap;gap:9px;}
.sent-choice{padding:9px 18px;border:2.5px solid #e8d5f8;border-radius:22px;font-size:15px;font-weight:700;background:white;cursor:pointer;color:#1a1a2e;font-family:'Rubik',sans-serif;direction:ltr;box-shadow:0 3px 0 #e0c8f0;}
.sent-choice.ok{border-color:#58cc02;background:#f0fff0;color:#36a001;animation:bounceIn .4s ease;}
.sent-choice.no{border-color:#ff4b4b;background:#fff0f0;color:#cc0000;animation:shake .3s ease;}
.fb-wrap{border-radius:16px;overflow:hidden;min-height:52px;}
.fb{padding:14px 16px;font-size:14px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;line-height:1.4;border-radius:16px;}
.fb.ok{background:linear-gradient(135deg,#e8fff0,#d4f8dd);color:#36a001;border:2px solid #b8f0c8;animation:slideUp .3s ease;}
.fb.no{background:linear-gradient(135deg,#fff0f0,#fde0e0);color:#cc0000;border:2px solid #f8c8c8;animation:slideUp .3s ease;}
.fb.empty{background:transparent;}
.act-btn{width:100%;padding:15px;border:none;border-radius:18px;font-size:17px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;letter-spacing:.2px;}
.act-btn.go{background:linear-gradient(135deg,#5838fa,#7c3aed);color:white;box-shadow:0 5px 0 #3a24c4;}
.act-btn.go:active{transform:translateY(2px);box-shadow:0 3px 0 #3a24c4;}
.act-btn.off{background:#e8e8f8;color:#bbb;cursor:not-allowed;box-shadow:0 4px 0 #d8d8ee;}

/* Game Over */
.gameover-wrap{flex:1;background:linear-gradient(160deg,#1a1a2e,#2d1b4e);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:16px;}
.gameover-emoji{font-size:80px;animation:bounceIn .6s ease both;}
.gameover-title{font-size:24px;font-weight:900;color:white;text-align:center;animation:slideUp .4s .15s ease both;}
.gameover-sub{font-size:14px;color:rgba(255,255,255,.65);text-align:center;line-height:1.6;animation:slideUp .4s .25s ease both;}
.gameover-btns{display:flex;flex-direction:column;gap:10px;width:100%;animation:slideUp .4s .4s ease both;}
.gameover-btn{padding:15px;border:none;border-radius:18px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;}
.gameover-btn.retry{background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;box-shadow:0 5px 0 #cc5520;}
.gameover-btn.quit{background:rgba(255,255,255,.12);color:white;border:2px solid rgba(255,255,255,.2);}

/* Complete */
.comp-wrap{flex:1;background:linear-gradient(160deg,#1a1a2e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:16px;overflow:hidden;}
.comp-trophy{font-size:90px;animation:bounceIn .7s cubic-bezier(.34,1.56,.64,1);}
.comp-title{font-size:26px;font-weight:900;color:white;text-align:center;animation:slideUp .5s .2s ease both;}
.comp-letter-row{display:flex;gap:14px;align-items:flex-end;justify-content:center;animation:bounceIn .6s .3s ease both;}
.comp-L{font-size:80px;font-weight:900;color:#ffd600;line-height:1;}.comp-l{font-size:54px;font-weight:700;color:#ffaa00;line-height:1.15;}
.comp-word-box{display:flex;flex-direction:column;align-items:center;gap:5px;animation:slideUp .5s .4s ease both;}
.comp-word-en{font-size:22px;font-weight:700;color:white;direction:ltr;}.comp-word-phon{font-size:15px;color:rgba(255,255,255,.7);font-weight:600;}.comp-word-he{font-size:14px;color:rgba(255,255,255,.55);}
.comp-stars{font-size:38px;letter-spacing:6px;animation:bounceIn .6s .5s ease both;}
.comp-xp-badge{background:linear-gradient(135deg,#ffd600,#ffaa00);color:#1a1a2e;border-radius:24px;padding:12px 28px;font-size:20px;font-weight:900;animation:popIn .6s .6s ease both;}
.comp-btns{display:flex;flex-direction:column;gap:10px;width:100%;animation:slideUp .5s .7s ease both;}
.comp-btn{padding:15px;border:none;border-radius:18px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;}
.comp-btn.main{background:linear-gradient(135deg,#5838fa,#7c3aed);color:white;box-shadow:0 5px 0 #3a24c4;}
.comp-btn.sec{background:rgba(255,255,255,.12);color:white;border:2px solid rgba(255,255,255,.2);}
.confetti-particle{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:1000;animation:confettiFall linear forwards;}
#xpFloat{position:fixed;font-size:22px;font-weight:900;color:#ffd600;pointer-events:none;z-index:1001;text-shadow:0 2px 8px rgba(0,0,0,.3);animation:xpFloat .9s ease forwards;}
.correct-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:500;}
.correct-burst{font-size:80px;animation:bounceIn .5s ease;}

/* Practice */
.prac-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:90px;background:#f8f8ff;}
/* Practice Hub */
.prac-goal{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;border-radius:18px;padding:14px 16px;box-shadow:0 4px 14px rgba(88,56,250,.12);}
.prac-goal-top{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px;}
.prac-goal-done{font-size:12px;color:#58cc02;font-weight:700;margin-top:8px;text-align:center;}
.prac-hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.prac-hub-card{background:white;border:2.5px solid #e8e0ff;border-radius:20px;padding:18px 12px;text-align:center;cursor:pointer;box-shadow:0 3px 0 #e0e0f0;transition:all .15s;display:flex;flex-direction:column;gap:4px;align-items:center;}
.prac-hub-card:active{transform:translateY(2px);box-shadow:0 1px 0 #e0e0f0;}
.prac-hub-card.smart{grid-column:1/3;border-color:#ffd600;background:linear-gradient(135deg,#fff8e1,#fff);}
.prac-hub-card.sm{padding:14px 8px;}
.phc-em{font-size:34px;}.phc-t{font-size:14px;font-weight:800;color:#1a1a2e;}.phc-d{font-size:11px;color:#aaa;}
/* Session */
.sess-head{display:flex;align-items:center;gap:10px;}
.sess-x{width:36px;height:36px;border-radius:50%;border:none;background:#e8e8f8;color:#5838fa;font-size:16px;font-weight:900;cursor:pointer;flex-shrink:0;}
.sess-prog{flex:1;height:10px;background:#e8e8f8;border-radius:10px;overflow:hidden;}
.sess-prog-fill{height:100%;background:linear-gradient(90deg,#5838fa,#a855f7);border-radius:10px;transition:width .3s;}
.sess-sc{font-size:13px;font-weight:800;color:#58cc02;flex-shrink:0;}
.setup-title{font-size:16px;font-weight:800;color:#5838fa;}
.sess-q-en{font-size:24px;font-weight:900;color:#1a1a2e;direction:ltr;margin-top:6px;cursor:pointer;}
.sess-q-phon{font-size:13px;color:#a855f7;margin-top:2px;}
.sess-spk{font-size:60px;cursor:pointer;}
.sess-res{text-align:center;padding:10px;}
.sess-res-sc{font-size:22px;font-weight:900;color:#5838fa;margin-top:6px;}
.sess-res-xp{font-size:13px;color:#888;}
.sess-res-list{display:flex;flex-direction:column;gap:6px;}
.sess-res-row{display:flex;align-items:center;gap:8px;background:white;border-radius:12px;padding:8px 10px;cursor:pointer;border-left:4px solid #58cc02;}
.sess-res-row.no{border-left-color:#ff4b4b;}
.srr-mark{font-weight:900;width:16px;}.sess-res-row.ok .srr-mark{color:#58cc02;}.sess-res-row.no .srr-mark{color:#ff4b4b;}
.srr-em{font-size:20px;}.srr-en{font-weight:800;direction:ltr;flex:1;}.srr-he{color:#888;font-size:13px;}
.sess-res-btns{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.act-btn.soft{background:#e8e8f8;color:#5838fa;box-shadow:0 4px 0 #d0d0ee;}
.act-btn.soft:active{transform:translateY(2px);box-shadow:0 2px 0 #d0d0ee;}
/* Focus setup */
.setup-sec{background:white;border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(88,56,250,.06);}
.setup-lbl{font-size:13px;font-weight:800;color:#1a1a2e;margin-bottom:8px;}
.setup-chips{display:flex;flex-wrap:wrap;gap:8px;}
.setup-chip{padding:8px 12px;border-radius:20px;border:2px solid #e8e0ff;background:#f8f8ff;font-size:12px;font-weight:700;color:#666;cursor:pointer;}
.setup-chip.on{border-color:#5838fa;background:#5838fa;color:white;}
.setup-seg{display:flex;gap:6px;}
.setup-seg-opt{flex:1;padding:10px 4px;border-radius:12px;border:2px solid #e8e0ff;background:#f8f8ff;font-size:12px;font-weight:700;color:#666;text-align:center;cursor:pointer;}
.setup-seg-opt.on{border-color:#5838fa;background:#5838fa;color:white;}
/* Match pairs */
.match-wrap{display:flex;gap:14px;}
.match-col{flex:1;display:flex;flex-direction:column;gap:10px;}
.match-item{padding:14px 8px;border-radius:14px;border:2.5px solid #e8e0ff;background:white;font-size:14px;font-weight:800;color:#1a1a2e;text-align:center;cursor:pointer;box-shadow:0 3px 0 #e0e0f0;direction:ltr;}
.match-item.he{direction:rtl;color:#5838fa;}
.match-item.match-on{border-color:#a855f7;background:#f3ecff;transform:scale(1.03);}
.match-item.match-done{opacity:.35;pointer-events:none;border-color:#58cc02;background:#f0fff0;}
.match-item.match-bad{border-color:#ff4b4b;background:#fff0f0;animation:shake .3s ease;}
/* Sentence builder */
.sb-area{display:flex;flex-direction:column;gap:12px;}
.sb-he{text-align:center;font-size:18px;font-weight:800;color:#5838fa;}
.sb-slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:50px;padding:10px;background:#f0eeff;border-radius:16px;direction:ltr;}
.sb-empty{color:#bbb;font-size:13px;align-self:center;}
.sb-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;direction:ltr;}
.sb-chip{padding:10px 14px;border-radius:12px;border:2.5px solid #e0e0f8;background:white;font-size:15px;font-weight:800;color:#5838fa;cursor:pointer;box-shadow:0 3px 0 #d0d0f0;direction:ltr;}
.sb-chip:active{transform:translateY(2px);box-shadow:0 1px 0 #d0d0f0;}
.sb-chip.placed{border-color:#5838fa;background:#f0eeff;}
.sb-chip.used{opacity:.25;pointer-events:none;}
.sb-chip.ok{border-color:#58cc02;background:#f0fff0;color:#36a001;}
.sb-chip.bad{border-color:#ff4b4b;background:#fff0f0;animation:shake .3s ease;}
/* Mastery */
.mastery-wrap{display:flex;flex-direction:column;gap:10px;}
.mastery-row{background:white;border-radius:14px;padding:12px;box-shadow:0 2px 10px rgba(88,56,250,.06);cursor:pointer;}
.mr-top{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.mr-top span:last-child{color:#888;font-size:12px;}
/* Practice dark mode */
body.dark .prac-hub-card{background:#242442;border-color:#444;box-shadow:0 3px 0 #1a1a2e;}
body.dark .phc-t{color:#e0e0e0;}
body.dark .prac-hub-card.smart{background:linear-gradient(135deg,#3a3320,#242442);}
body.dark .sess-x,body.dark .sess-prog{background:#333;}
body.dark .act-btn.soft{background:#333;color:#e0e0e0;box-shadow:0 4px 0 #1a1a2e;}
body.dark .setup-sec,body.dark .sess-res-row,body.dark .mastery-row{background:#242442;}
body.dark .setup-lbl,body.dark .mr-top{color:#e0e0e0;}
body.dark .setup-chip,body.dark .setup-seg-opt{background:#1e1e38;border-color:#444;color:#bbb;}
body.dark .setup-chip.on,body.dark .setup-seg-opt.on{background:#5838fa;color:white;border-color:#5838fa;}
body.dark .match-item{background:#242442;border-color:#444;color:#e0e0e0;box-shadow:0 3px 0 #1a1a2e;}
body.dark .sb-slots{background:#1e1e38;}
body.dark .sb-chip{background:#242442;border-color:#444;box-shadow:0 3px 0 #1a1a2e;}
body.dark .srr-en{color:#e0e0e0;}
.prac-score{display:flex;gap:20px;justify-content:center;background:white;border-radius:18px;padding:14px;box-shadow:0 2px 12px rgba(88,56,250,.07);}
.psc{text-align:center;}.psc-n{font-size:28px;font-weight:900;}.psc-n.g{color:#58cc02;}.psc-n.r{color:#ff4b4b;}.psc-n.gr{color:#aaa;}
.psc-l{font-size:11px;color:#bbb;margin-top:2px;}

/* Memory Game */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:4px;}
.mem-card{aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;text-align:center;transition:all .3s;position:relative;perspective:600px;}
.mem-card-inner{width:100%;height:100%;border-radius:16px;transition:transform .4s;transform-style:preserve-3d;}
.mem-card.flipped .mem-card-inner{transform:rotateY(180deg);}
.mem-card.matched .mem-card-inner{transform:rotateY(180deg);}
.mem-card.matched{opacity:.6;pointer-events:none;}
.mem-face{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;padding:6px;}
.mem-front{background:linear-gradient(135deg,#5838fa,#7c3aed);color:white;font-size:28px;box-shadow:0 3px 0 #3a24c4;}
.mem-back{background:white;border:2.5px solid #e8e0ff;transform:rotateY(180deg);font-size:14px;color:#1a1a2e;line-height:1.3;}
.mem-back-em{font-size:28px;margin-bottom:2px;}
.mem-back-txt{font-size:11px;font-weight:700;direction:ltr;}
.mem-stats{display:flex;gap:16px;justify-content:center;font-size:13px;font-weight:700;color:#888;padding:8px;}

/* Dictionary */
.dict-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;padding-bottom:90px;background:#f8f8ff;}
.dict-search{border:2.5px solid #e8e0ff;border-radius:16px;padding:12px 16px;font-size:14px;font-family:'Rubik',sans-serif;direction:rtl;width:100%;outline:none;background:white;}
.dict-search:focus{border-color:#a855f7;}
.dict-sort-row{display:flex;gap:8px;padding:4px 0;}
.dict-sort-btn{padding:6px 14px;border-radius:20px;border:2px solid #e8e0ff;background:white;font-size:11px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;color:#888;}
.dict-sort-btn.on{background:#5838fa;color:white;border-color:#5838fa;}
.dict-sec-header{display:flex;align-items:center;gap:10px;padding:8px 4px 4px;}
.dict-sec-title{font-size:12px;font-weight:700;color:#aaa;}.dict-sec-line{flex:1;height:1px;background:#e8e0f0;}
.dict-card{background:white;border-radius:18px;padding:14px 16px;box-shadow:0 2px 10px rgba(88,56,250,.06);border:1.5px solid #f0eeff;cursor:pointer;}
.dc-top{display:flex;gap:14px;align-items:flex-start;}
.dc-letters{display:flex;flex-direction:column;align-items:center;min-width:50px;}
.dc-big{font-size:44px;font-weight:900;color:#5838fa;line-height:1;}.dc-small{font-size:26px;font-weight:700;color:#a855f7;}
.dc-snd{font-size:10px;color:#bbb;margin-top:2px;text-align:center;background:#f5f0ff;border-radius:8px;padding:2px 6px;}
.dc-main{flex:1;}.dc-em{font-size:28px;margin-bottom:5px;}
.dc-en{font-size:18px;font-weight:700;color:#1a1a2e;direction:ltr;text-align:left;}.dc-phon{font-size:13px;color:#a855f7;font-weight:600;margin-top:2px;}.dc-he{font-size:12px;color:#888;margin-top:2px;}
.dc-extra{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;border-top:1px solid #f5f0ff;padding-top:8px;}
.dc-chip{background:#f5f0ff;border-radius:22px;padding:5px 12px;font-size:12px;font-weight:700;color:#7c3aed;display:flex;align-items:center;gap:5px;border:1px solid #e8d5ff;}
.dict-word-card{background:white;border-radius:16px;padding:12px 14px;box-shadow:0 2px 8px rgba(88,56,250,.05);border:1.5px solid #f5f0ff;cursor:pointer;display:flex;align-items:center;gap:12px;}
.dwc-em{font-size:26px;flex-shrink:0;}.dwc-body{flex:1;}.dwc-en{font-size:16px;font-weight:700;color:#1a1a2e;direction:ltr;text-align:left;}.dwc-phon{font-size:12px;color:#a855f7;font-weight:600;margin-top:1px;}.dwc-he{font-size:12px;color:#aaa;margin-top:1px;}
.dwc-letter-tag{font-size:12px;font-weight:700;color:#a855f7;background:#f5f0ff;border-radius:10px;padding:3px 10px;flex-shrink:0;}

/* Progress */
.prog-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:90px;background:#f8f8ff;}
.prog-card{background:white;border-radius:20px;padding:18px;box-shadow:0 2px 12px rgba(88,56,250,.06);border:1.5px solid #f0eeff;}
.prog-card-t{font-size:13px;font-weight:700;color:#aaa;margin-bottom:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mstat{background:linear-gradient(135deg,#f8f4ff,#fff);border-radius:14px;padding:14px;text-align:center;border:1.5px solid #f0eeff;}
.mstat-n{font-size:28px;font-weight:900;color:#5838fa;}.mstat-l{font-size:11px;color:#aaa;margin-top:3px;}
.les-row-p{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1.5px solid #f8f6ff;}
.les-row-p:last-child{border-bottom:none;}
.lrp-l{display:flex;align-items:center;gap:10px;}.lrp-letter{font-size:24px;font-weight:900;color:#5838fa;}
.lrp-word{font-size:13px;font-weight:700;color:#1a1a2e;}.lrp-phon{font-size:11px;color:#a855f7;margin-top:1px;}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.ach-badge{display:flex;flex-direction:column;align-items:center;gap:6px;background:white;border-radius:18px;padding:14px 8px;border:2px solid #f0eeff;text-align:center;transition:all .2s;}
.ach-badge.earned{border-color:#ffd600;background:linear-gradient(160deg,#fffde7,#fff);}
.ach-badge.locked{opacity:.4;filter:grayscale(1);}
.ach-em{font-size:32px;}.ach-title{font-size:10px;font-weight:700;color:#1a1a2e;line-height:1.3;}.ach-desc{font-size:9px;color:#aaa;line-height:1.3;}
.ach-popup{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ffd600,#ffaa00);color:#1a1a2e;border-radius:22px;padding:14px 24px;font-size:14px;font-weight:900;display:flex;align-items:center;gap:10px;z-index:1100;box-shadow:0 8px 30px rgba(255,170,0,.5);animation:achPop .5s ease both;}
.ach-popup-em{font-size:28px;}

/* Settings */
.settings-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:30px;background:#f8f8ff;}
.set-card{background:white;border-radius:20px;padding:18px;box-shadow:0 2px 12px rgba(88,56,250,.06);border:1.5px solid #f0eeff;}
.set-card-t{font-size:13px;font-weight:700;color:#aaa;margin-bottom:14px;}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f8f6ff;}
.set-row:last-child{border-bottom:none;}
.set-row-label{font-size:13px;font-weight:700;color:#1a1a2e;}.set-row-desc{font-size:11px;color:#aaa;margin-top:2px;}
.toggle{width:48px;height:28px;border-radius:14px;background:#ddd;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:#58cc02;}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:white;box-shadow:0 2px 4px rgba(0,0,0,.2);transition:left .2s;}
.toggle.on::after{left:23px;}
.set-slider{width:100%;margin-top:8px;accent-color:#5838fa;}
.set-btn{width:100%;padding:14px;border:none;border-radius:16px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;margin-top:6px;}
.set-btn.dev{background:#fff3e0;color:#e65100;border:2px solid #ffe0b2;}
.set-btn.dev.active{background:#e65100;color:white;}

/* Story */
.story-card{background:white;border-radius:22px;padding:20px;border:2px solid #e0f7fa;box-shadow:0 4px 20px rgba(0,150,136,.1);}
.story-line{font-size:17px;font-weight:700;color:#1a1a2e;direction:ltr;text-align:left;line-height:2;padding:6px 0;border-bottom:1px solid #f0f8ff;cursor:pointer;}
.story-line:last-child{border-bottom:none;}
.story-line-he{font-size:12px;color:#888;direction:rtl;text-align:right;margin-top:2px;}
.story-line-phon{font-size:12px;color:#00897b;font-weight:600;}
.story-q{background:linear-gradient(145deg,#e0f7fa,#fff);border-radius:18px;padding:16px;border:2px solid #b2ebf2;margin-top:8px;}

/* Shared */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a2e;color:white;padding:11px 22px;border-radius:22px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;font-family:'Rubik',sans-serif;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.hidden{display:none;}
.hdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;}
.hdr-back{background:rgba(255,255,255,.15);border:none;color:white;border-radius:50%;width:36px;height:36px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Rubik',sans-serif;}
.hdr-info{flex:1;}.hdr-title{font-size:17px;font-weight:700;line-height:1;}.hdr-sub{font-size:11px;opacity:.7;margin-top:2px;}

/* Lang Tip Popup */
.lang-tip{background:linear-gradient(135deg,#fff8e1,#fff3e0);border:2.5px solid #ffcc02;border-radius:20px;padding:16px;margin-top:8px;animation:slideUp .4s ease both;}
.lang-tip-title{font-size:14px;font-weight:900;color:#e65100;margin-bottom:6px;}
.lang-tip-body{font-size:13px;color:#555;line-height:1.7;}
.lang-tip-ex{font-size:12px;color:#888;margin-top:6px;background:#fff;border-radius:10px;padding:8px 12px;direction:ltr;text-align:left;}
body.dark .lang-tip{background:linear-gradient(135deg,#3a3000,#2d2200);border-color:#aa8800;}
body.dark .lang-tip-body{color:#ccc;}body.dark .lang-tip-ex{background:#1e1e38;color:#aaa;}

/* Theme Cards */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:4px;}
.theme-card{border-radius:20px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;border:2.5px solid #e8e0ff;background:white;transition:all .2s;box-shadow:0 3px 0 #e0e0f0;}
.theme-card:active{transform:translateY(2px);box-shadow:0 1px 0 #e0e0f0;}
.theme-card-em{font-size:36px;}.theme-card-title{font-size:13px;font-weight:700;color:#1a1a2e;}
.theme-card-count{font-size:11px;color:#aaa;}
body.dark .theme-card{background:#242442;border-color:#444;box-shadow:0 3px 0 #1a1a2e;}

/* Flashcards */
.fc-card{width:100%;min-height:160px;perspective:600px;cursor:pointer;margin:8px 0;}
.fc-inner{width:100%;min-height:160px;transition:transform .5s;transform-style:preserve-3d;position:relative;}
.fc-card.flipped .fc-inner{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;}
.fc-front{background:linear-gradient(135deg,#5838fa,#7c3aed);color:white;box-shadow:0 4px 20px rgba(88,56,250,.3);}
.fc-front-em{font-size:48px;}.fc-front-word{font-size:28px;font-weight:900;direction:ltr;}.fc-front-phon{font-size:14px;opacity:.7;}
.fc-back{background:linear-gradient(135deg,#58cc02,#36a001);color:white;transform:rotateY(180deg);box-shadow:0 4px 20px rgba(88,204,2,.3);}
.fc-back-he{font-size:28px;font-weight:900;}.fc-back-sub{font-size:14px;opacity:.7;}
.fc-hint{font-size:12px;color:#aaa;text-align:center;}
.fc-nav{display:flex;gap:10px;justify-content:center;margin-top:8px;}
.fc-nav-btn{padding:10px 24px;border:none;border-radius:16px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;}
.fc-nav-btn.know{background:#58cc02;color:white;box-shadow:0 3px 0 #36a001;}
.fc-nav-btn.dunno{background:#ff4b4b;color:white;box-shadow:0 3px 0 #cc0000;}
.fc-counter{font-size:12px;color:#aaa;text-align:center;margin-bottom:4px;}

/* Bilingual Reader */
.bil-line{padding:12px 14px;border-radius:14px;cursor:pointer;transition:all .3s;margin:4px 0;border:1.5px solid transparent;}
.bil-line.active{background:#e3f2fd;border-color:#90caf9;}
.bil-line-en{font-size:17px;font-weight:700;color:#1a1a2e;direction:ltr;text-align:left;}
.bil-line-he{font-size:13px;color:#888;margin-top:4px;}
.bil-line-phon{font-size:12px;color:#00897b;font-weight:600;margin-top:2px;}
.bil-controls{display:flex;gap:10px;justify-content:center;padding:8px;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:8px;}
.bil-btn{padding:10px 20px;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;background:#5838fa;color:white;box-shadow:0 3px 0 #3a24c4;}
.bil-btn.stop{background:#ff4b4b;box-shadow:0 3px 0 #cc0000;}
.bil-btn:active{transform:translateY(2px);}
body.dark .bil-line.active{background:#1a2a4a;border-color:#2a4a7a;}
body.dark .bil-line-en{color:#e0e0e0;}
body.dark .bil-controls{background:#242442;box-shadow:none;border:1px solid #333;}

/* Completion Remark */
.comp-remark{font-size:14px;color:rgba(255,255,255,.85);text-align:center;line-height:1.7;animation:slideUp .5s .8s ease both;background:rgba(255,255,255,.08);border-radius:16px;padding:12px 18px;max-width:300px;}

/* Scramble Game */
.scram-target{font-size:48px;text-align:center;margin:8px 0;}
.scram-slots{display:flex;gap:8px;justify-content:center;min-height:52px;padding:8px;background:#f0eeff;border-radius:16px;flex-wrap:wrap;}
.scram-slot{width:42px;height:48px;border:2.5px dashed #d0c8ff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#5838fa;background:white;direction:ltr;}
.scram-slot.filled{border-style:solid;border-color:#5838fa;background:#f0eeff;animation:popIn .2s ease;}
.scram-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.scram-chip{width:44px;height:48px;border:2.5px solid #e0e0f8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#5838fa;background:white;cursor:pointer;box-shadow:0 3px 0 #d0d0f0;transition:all .15s;direction:ltr;}
.scram-chip:active{transform:translateY(2px);box-shadow:0 1px 0 #d0d0f0;}
.scram-chip.used{opacity:.3;pointer-events:none;}

/* True/False Game */
.tf-card{background:white;border-radius:22px;padding:24px;text-align:center;box-shadow:0 4px 20px rgba(88,56,250,.1);border:2px solid #f0eeff;}
.tf-word{font-size:32px;font-weight:900;color:#1a1a2e;direction:ltr;}
.tf-claim{font-size:20px;font-weight:700;color:#5838fa;margin-top:8px;}
.tf-btns{display:flex;gap:14px;justify-content:center;margin-top:16px;}
.tf-btn{width:100px;height:100px;border-radius:50%;border:none;font-size:40px;cursor:pointer;transition:all .2s;box-shadow:0 4px 0 rgba(0,0,0,.15);}
.tf-btn.yes{background:linear-gradient(135deg,#58cc02,#36a001);}.tf-btn.no-btn{background:linear-gradient(135deg,#ff4b4b,#cc0000);}
.tf-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.1);}
.tf-btn.correct{animation:bounceIn .4s ease;transform:scale(1.15);}.tf-btn.wrong{animation:shake .4s ease;opacity:.5;}

/* Speed Round */
.speed-timer{font-size:48px;font-weight:900;color:#5838fa;text-align:center;font-variant-numeric:tabular-nums;}
.speed-timer.warn{color:#ff4b4b;animation:shake .3s ease;}
.speed-bar{height:8px;background:#f0eeff;border-radius:8px;overflow:hidden;margin:8px 0;}
.speed-bar-fill{height:100%;background:linear-gradient(90deg,#58cc02,#ffd600,#ff4b4b);border-radius:8px;transition:width .1s linear;}
.speed-score{font-size:14px;font-weight:700;color:#888;text-align:center;}

/* Catch Word Game */
.catch-arena{position:relative;width:100%;height:320px;background:linear-gradient(180deg,#e8f5ff,#f0eeff);border-radius:22px;overflow:hidden;border:2px solid #e0e0ff;}
.catch-word{position:absolute;font-size:16px;font-weight:900;background:white;border:2.5px solid #e0e0f8;border-radius:20px;padding:8px 16px;cursor:pointer;box-shadow:0 3px 8px rgba(88,56,250,.15);transition:background .15s;direction:ltr;white-space:nowrap;z-index:2;}
.catch-word:active{background:#f0eeff;}
.catch-word.right{background:#e8fff0;border-color:#58cc02;animation:bounceIn .3s ease;}
.catch-word.wrong-w{background:#fff0f0;border-color:#ff4b4b;animation:shake .3s ease;}
.catch-prompt-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(88,56,250,.95),rgba(88,56,250,.8));padding:14px;text-align:center;color:white;font-weight:900;font-size:16px;border-radius:0 0 20px 20px;z-index:5;}
body.dark .catch-arena{background:linear-gradient(180deg,#1a2040,#1a1a2e);border-color:#333;}
body.dark .catch-word{background:#242442;border-color:#444;color:#e0e0e0;}
body.dark .tf-card{background:#242442;border-color:#333;}.dark .tf-word{color:#e0e0e0;}
body.dark .scram-slots{background:#1e1e38;}body.dark .scram-slot{background:#242442;border-color:#444;}
body.dark .scram-chip{background:#242442;border-color:#444;box-shadow:0 3px 0 #1a1a2e;}

/* Review Session */
.review-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;animation:slideUp .4s .3s ease both;}
.review-item{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;color:white;}
.review-item-em{font-size:24px;}.review-item-word{font-size:15px;font-weight:700;direction:ltr;}
.review-item-he{font-size:12px;opacity:.6;}

/* DARK MODE */

async function speak(txt){
  const rate=(LS.settings&&LS.settings.ttsSpeed)||0.72;
  if(IS_NATIVE){
    try{
      const TTS=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.TextToSpeech;
      if(TTS){await TTS.speak({text:txt,lang:'en-US',rate,pitch:1.0,volume:1.0});return;}
    }catch(e){}
  }
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);u.lang='en-US';u.rate=rate;
  const trySpeak=()=>{const vs=speechSynthesis.getVoices();if(vs.length){const v=vs.find(x=>x.lang.startsWith('en'));if(v)u.voice=v;}speechSynthesis.speak(u);};
  if(speechSynthesis.getVoices().length>0)trySpeak();
  else{speechSynthesis.addEventListener('voiceschanged',trySpeak,{once:true});setTimeout(trySpeak,800);}
}

function startGroupReview(from,to){

  letters.forEach(idx=>{
    const lt=LETTERS[idx];

    if(dist.length>=3){qs.push({lt,dist,type:'pic'});qs.push({lt,dist,type:'letter'});}
  });
  qs=shuf(qs).slice(0,8);

function startTopicLesson(topic){

    opts.forEach(o=>{const bt=mk('button','mcq-opt');bt.textContent=o.w;bt.onclick=()=>{if(stepDone)return;stepDone=true;g.querySelectorAll('button').forEach(x=>x.disabled=true);if(o.ok){bt.classList.add('ok');SFX.play('correct');LS.xp+=5;LS.learnedWords[w.w.toLowerCase()]={w:w.w,phon:w.phon,he:w.he,em:w.em,ts:Date.now()};step++;LS.tc[topic.id]=step;sLS();setTimeout(()=>{stepDone=false;renderTopicStep();},700);}else{bt.classList.add('no');g.querySelectorAll('button').forEach(x=>{if(x.textContent===w.he)x.classList.add('ok');});SFX.play('wrong');if(hearts>0){hearts--;document.getElementById('lHearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(3-hearts);}setTimeout(()=>{stepDone=false;},600);}};g.appendChild(bt);});

// ══ LESSON ENGINE ══
let curIdx=0,curStep=0,hearts=3,mistakes=0,stepDone=false,writeAttempts=0,isPhrase=false,curPhraseIdx=0;

function getSteps(idx){
  const lt=LETTERS[idx],ex=LS.settings.exercises;
  const others=LETTERS.filter((_,i)=>i!==idx&&getDone(i)>=4);
  const pool=others.length>=3?others:LETTERS.filter((_,i)=>i!==idx).slice(0,4);
  const dist=shuf(pool).slice(0,3);
  const allW=[{w:lt.word,phon:lt.wPhon,he:lt.wHe,em:lt.wEm},...lt.more];
  const sub=Math.min(4,LS.lc[idx]||0);
  if(sub===0)return[{type:'intro',lt},{type:'listen',lt},{type:'write_letter',lt}];
  if(sub===1)return[{type:'mcq_pic',lt,dist},{type:'true_false',lt,allW},{type:'write_word',lt}];
  if(sub===2)return[{type:'scramble',lt},{type:'dictation',lt},{type:'catch_word',lt,dist,allW}];
  if(sub===3)return[{type:'speed_round',lt,dist,allW},{type:'mcq_letter',lt,dist},{type:'sentence',lt}];
  return[{type:'dictation',lt},{type:'mcq_pic',lt,dist},{type:'sentence',lt},{type:'write_word',lt}];
}
function startLesson(idx){isPhrase=false;isDailyChallenge=false;curIdx=idx;curStep=0;hearts=3;mistakes=0;stepDone=false;writeAttempts=0;LS.sessionMistakes=[];const lt=LETTERS[idx];const sub=Math.min(3,LS.lc[idx]||0);const subN=['📖 לומדים','🎯 מתרגלים','🎮 משחקים','⚡ אתגר'];document.getElementById('lTitle').textContent=lt.L+' — '+subN[sub]+' ('+(sub+1)+'/4)';sw('scLesson');SFX.init();renderStep();}
function exitLesson(){if(confirm('לצאת?'))showHome();}
function loseHeart(){if(hearts>0){hearts--;SFX.play('wrong');}document.getElementById('lHearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(3-hearts);if(hearts===0)setTimeout(()=>{sw('scGameOver');
  // Show mistakes
  const rl=document.getElementById('reviewList');rl.innerHTML='';
  const uniq=[...new Set(LS.sessionMistakes||[])];
  uniq.slice(0,5).forEach(w=>{const wdata=LS.learnedWords[w.toLowerCase()]||{em:'📝',he:'?'};rl.innerHTML+=`<div class="review-item"><div class="review-item-em">${wdata.em||'📝'}</div><div><div class="review-item-word">${w}</div><div class="review-item-he">${wdata.he||''}</div></div></div>`;});
  if(!uniq.length)rl.innerHTML='<div style="color:rgba(255,255,255,.5);text-align:center;padding:8px">אין טעויות ספציפיות</div>';
  document.getElementById('goRetry').onclick=()=>{LS.sessionMistakes=[];isDailyChallenge?showHome():isPhrase?startPhraseLesson(curPhraseIdx):startLesson(curIdx);};
  document.getElementById('goReview').onclick=()=>{LS.sessionMistakes=[];startReviewSession(uniq);};
  },600);}
function advance(){
  if(isDailyChallenge){if(window._reviewOnDone){const fn=window._reviewOnDone;window._reviewOnDone=null;fn();return;}LS.dailyDone=true;sLS();showHome();toast('⚡ אתגר יומי הושלם! +25 XP');LS.xp+=25;sLS();checkAchievements();return;}
  const steps=isPhrase?getPhraseSteps(curPhraseIdx):getSteps(curIdx);
  curStep++;stepDone=false;writeAttempts=0;
  if(curStep>=steps.length)finishLesson();else renderStep();
}
function renderStep(){
  const steps=isDailyChallenge?dailySteps:(isPhrase?getPhraseSteps(curPhraseIdx):getSteps(curIdx));
  const step=steps[curStep],total=steps.length;stepDone=false;
  document.getElementById('lStep').textContent='שלב '+(curStep+1)+'/'+total;
  document.getElementById('lProgFill').style.width=(curStep/total*100)+'%';
  document.getElementById('lHearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(3-hearts);
  const body=document.getElementById('lesBody');body.innerHTML='';
  ({intro:rIntro,listen:rListen,write_letter:rWriteLetter,mcq_pic:rMcqPic,dictation:rDictation,write_word:rWriteWord,mcq_letter:rMcqLetter,sentence:rSentence,scramble:rScramble,true_false:rTrueFalse,catch_word:rCatchWord,speed_round:rSpeedRound,phrases_intro:rPhrIntro,phrases_listen:rPhrListen,phrases_write:rPhrWrite,phrases_sentence:rPhrSent,story_read:rStoryRead,story_quiz:rStoryQuiz}[step.type])(step,body);
}

function rScramble({lt},b){
  stepDone=false;curWordContext=lt.word;
  const word=lt.word.toUpperCase();const letters=shuf(word.split(''));
  const card=mk('div','card center anim-slideUp');
  card.innerHTML=`<div class="mcq-prompt">🎯 סדר את האותיות למילה!</div><div class="scram-target">${lt.wEm}</div><div style="font-size:13px;color:#a855f7">📢 ${lt.wPhon} = ${lt.wHe}</div><div class="scram-slots" id="scSlots"></div><div class="scram-chips" id="scChips"></div>`;
  b.appendChild(card);
  const slotsEl=document.getElementById('scSlots');const chipsEl=document.getElementById('scChips');
  let placed=[];
  function render(){
    slotsEl.innerHTML='';chipsEl.innerHTML='';
    word.split('').forEach((_,i)=>{const s=mk('div','scram-slot'+(placed[i]?' filled':''));s.textContent=placed[i]||'';if(placed[i])s.onclick=()=>{placed[i]='';render();};slotsEl.appendChild(s);});
    const usedIdxs=[];placed.forEach(p=>{if(p){const fi=letters.findIndex((x,i)=>x===p&&!usedIdxs.includes(i));if(fi>=0)usedIdxs.push(fi);}});
    letters.forEach((ch,i)=>{const s=mk('div','scram-chip'+(usedIdxs.includes(i)?' used':''));s.textContent=ch;s.onclick=()=>{if(usedIdxs.includes(i))return;const slot=placed.indexOf('');const emptyIdx=placed.length<word.length?placed.length:placed.indexOf(undefined);
      // Find first empty slot
      let si=-1;for(let j=0;j<word.length;j++){if(!placed[j]){si=j;break;}}
      if(si===-1)return;placed[si]=ch;SFX.play('click');render();checkScramble();};chipsEl.appendChild(s);});
  }
  placed=new Array(word.length).fill('');
  render();
  function checkScramble(){
    if(placed.join('')===word){stepDone=true;setFb('✅ מעולה! '+lt.word+' = '+lt.wHe,'ok');onCorrect(15);speak(lt.word);enableAct('המשך ←',advance);}
  }
  addFb(b);addActBtn(b,'סדר את האותיות',false,null);
}

function rTrueFalse({lt,allW},b){
  stepDone=false;curWordContext=lt.word;

  const isTrue=Math.random()>0.4;

// ══ CATCH WORD GAME ══
function rCatchWord({lt,dist,allW},b){
  stepDone=false;curWordContext=lt.word;
  const target=allW[Math.floor(Math.random()*allW.length)];
  const wrongWords=[];dist.forEach(d=>{wrongWords.push({w:d.word});d.more.forEach(m=>wrongWords.push({w:m.w}));});
  const wrong=shuf(wrongWords).slice(0,4);
  
  b.appendChild(mk('div','mcq-prompt anim-slideUp','🎪 תפוס: <b>'+target.he+'</b> '+target.em));
  const arena=mk('div','catch-arena');
  arena.innerHTML=`<div class="catch-prompt-bar">${target.em} ${target.he}</div>`;
  b.appendChild(arena);
  
  let caught=false,waveNum=0,maxWaves=3,failTimer=null;
  
  function spawnWave(){
    if(caught||waveNum>=maxWaves)return;
    waveNum++;
    // Each wave has the correct word + 2-3 wrong words
    const waveWords=shuf([{w:target.w,ok:true},...shuf(wrong).slice(0,3).map(x=>({w:x.w,ok:false}))]);
    
    waveWords.forEach((item,i)=>{
      setTimeout(()=>{
        if(caught)return;
        const el=document.createElement('div');
        el.className='catch-word';
        el.textContent=item.w;
        el.style.left=(10+i*20+Math.random()*10)+'%';
        el.style.top='-50px';
        // Use CSS transition for smooth falling
        arena.appendChild(el);
        
        // Animate with JS intervals (more reliable than rAF for this)
        let posY=-50;
        const fallSpeed=0.4+Math.random()*0.3; // Slower!
        const fallInterval=setInterval(()=>{
          if(caught){clearInterval(fallInterval);el.remove();return;}
          posY+=fallSpeed;
          el.style.top=posY+'px';
          if(posY>240){
            clearInterval(fallInterval);
            el.style.opacity='0';
            setTimeout(()=>el.remove(),200);
          }
        },16);
        
        el.onclick=()=>{
          if(caught)return;
          clearInterval(fallInterval);
          if(item.ok){
            caught=true;stepDone=true;
            if(failTimer)clearTimeout(failTimer);
            el.classList.add('right');
            el.style.top=posY+'px'; // Freeze position
            SFX.play('correct');
            setFb('✅ '+target.w+' = '+target.he,'ok');
            onCorrect(15);speak(target.w);
            enableAct('המשך ←',advance);
            // Remove other words
            arena.querySelectorAll('.catch-word').forEach(x=>{if(x!==el)x.remove();});
          } else {
            el.classList.add('wrong-w');
            SFX.play('wrong');
            setTimeout(()=>el.remove(),400);
          }
        };
      }, i*600); // Stagger spawns within wave
    });
    
    // Schedule next wave
    if(waveNum<maxWaves){
      setTimeout(()=>spawnWave(), waveWords.length*600+1500);
    }
  }
  
  // Start first wave
  setTimeout(spawnWave,400);
  
  // Failsafe: if player misses all waves, auto-reveal answer
  failTimer=setTimeout(()=>{
    if(!caught){
      caught=true;stepDone=true;
      arena.querySelectorAll('.catch-word').forEach(x=>x.remove());
      const reveal=mk('div','catch-word right',target.w);
      reveal.style.left='50%';reveal.style.top='40%';
      reveal.style.transform='translateX(-50%)';reveal.style.fontSize='22px';
      arena.appendChild(reveal);
      setFb('💡 התשובה: '+target.w+' = '+target.he,'no');
      onWrong();
      enableAct('המשך ←',advance);
    }
  }, 18000); // 18 second failsafe
  
  addFb(b);addActBtn(b,'תפוס!',false,null);
}

// ══ SPEED ROUND ══
function rSpeedRound({lt,dist,allW},b){
  curWordContext=lt.word;
  const questions=[];
  // Generate 4 quick MCQ questions from this letter's words
  allW.forEach(w=>{
    const wrongPool=[...dist.flatMap(d=>[{w:d.word,he:d.wHe},...d.more.map(m=>({w:m.w,he:m.he}))])];
    const wrongs=shuf(wrongPool).slice(0,2);
    questions.push({w:w.w,he:w.he,em:w.em,opts:shuf([w.he,...wrongs.map(x=>x.he)])});
  });
  const qs=shuf(questions).slice(0,4);
  let qi=0,score=0,timeLeft=20;
  
  b.appendChild(mk('div','mcq-prompt anim-slideUp','⚡ סיבוב מהיר! ענה לפני שהזמן נגמר'));
  const timerEl=mk('div','speed-timer','20');b.appendChild(timerEl);
  const barEl=mk('div','speed-bar');barEl.innerHTML='<div class="speed-bar-fill" id="spBar" style="width:100%"></div>';b.appendChild(barEl);
  const scoreEl=mk('div','speed-score','0/'+qs.length+' נכון');b.appendChild(scoreEl);
  const qArea=mk('div','');qArea.id='spArea';b.appendChild(qArea);
  
  const timer=setInterval(()=>{timeLeft--;timerEl.textContent=timeLeft;document.getElementById('spBar').style.width=(timeLeft/20*100)+'%';
    if(timeLeft<=5)timerEl.classList.add('warn');
    if(timeLeft<=0){clearInterval(timer);finishSpeed();}
  },1000);
  
  function renderQ(){
    if(qi>=qs.length){clearInterval(timer);finishSpeed();return;}
    const q=qs[qi];qArea.innerHTML='';
    qArea.appendChild(mk('div','card center anim-slideUp',`<div style="font-size:32px">${q.em}</div><div style="font-size:20px;font-weight:900;direction:ltr;margin-top:4px">${q.w}</div>`));
    const g=mk('div','mcq-opts anim-slideUp');g.style.marginTop='10px';
    q.opts.forEach(opt=>{const bt=mk('button','mcq-opt');bt.textContent=opt;bt.onclick=()=>{const ok=opt===q.he;bt.classList.add(ok?'ok':'no');if(ok){score++;SFX.play('correct');}else SFX.play('wrong');
      srsRecord(q.w,ok);scoreEl.textContent=score+'/'+qs.length+' נכון';qi++;setTimeout(renderQ,400);};g.appendChild(bt);});
    qArea.appendChild(g);
  }
  function finishSpeed(){
    stepDone=true;
    const pct=score/qs.length;
    if(pct>=0.75)onCorrect(20);else if(pct>=0.5){LS.xp+=5;sLS();}else onWrong();
    setFb(pct>=0.75?'🏆 '+score+'/'+qs.length+' מעולה!':pct>=0.5?'👍 '+score+'/'+qs.length:'💪 '+score+'/'+qs.length+' — תתאמן!',pct>=0.5?'ok':'no');
    enableAct('המשך ←',advance);
  }
  renderQ();addFb(b);addActBtn(b,'ענה!',false,null);
}

// ══ FOCUS POOL ══
function buildFocusPool(focus){
  const map={},add=x=>{if(x&&x.w&&x.he){const k=x.w.toLowerCase();if(!map[k])map[k]={w:x.w,phon:x.phon||'',he:x.he,em:x.em||'📝'};}};
  const src=(focus.topics&&focus.topics.length)?focus.topics:['all'];
  if(src.includes('all')){allLearnedWords().forEach(add);return Object.values(map);}
  src.forEach(s=>{
    if(s==='letters'){LETTERS.forEach((lt,i)=>{if(getDone(i)>0)[{w:lt.word,phon:lt.wPhon,he:lt.wHe,em:lt.wEm},...lt.more].forEach(add);});}
    else if(s==='phrases'){PHRASES.forEach(p=>p.items.forEach(it=>add({w:it.en,phon:it.phon,he:it.he,em:it.em})));}
    else if(s==='weak'){const learned=allLearnedWords();getWeakWords(40).forEach(wk=>{const f=learned.find(x=>x.w.toLowerCase()===wk);if(f)add(f);});}
    else{const th=THEMES.find(t=>t.id===s);if(th)th.words.forEach(add);}
  });
  return Object.values(map);
}

// ══ SRS-WEIGHTED ORDERING ══
function getDueWords(pool,n){
  const now=Date.now();
  const scored=pool.map(w=>{const s=LS.srs[w.w.toLowerCase()];let pri=1,sc=0.5;if(s){sc=s.c/(s.c+s.w+1);if(s.next<=now)pri=3;else if(s.w>s.c)pri=2;else pri=0;}return {w,pri,sc,r:Math.random()};});
  scored.sort((a,b)=>b.pri-a.pri||a.sc-b.sc||a.r-b.r);
  return scored.slice(0,n||scored.length).map(x=>x.w);
}

// ══ SESSION ENGINE ══
let SESS=null;
function startSession(opts){
  const pool=opts.pool.slice(),b=document.getElementById('pracBody');
  if(pool.length<3){b.innerHTML='';const h=mk('div','sess-head');h.innerHTML='<button class="sess-x" onclick="showPracHub()">✕</button>';b.appendChild(h);b.appendChild(mk('div','',`<div style="text-align:center;padding:30px;font-weight:700;color:#5838fa">למד עוד מילים קודם! 📚</div>`));return;}
  const len=opts.length==='all'?pool.length:Math.min(parseInt(opts.length)||10,pool.length);
  const queue=opts.weighted===false?shuf(pool).slice(0,len):getDueWords(pool,len);
  SESS={queue,idx:0,right:0,wrong:0,results:[],opts,pool,locked:false};
  renderSessQ();
}
function pickKind(w){
  const o=SESS.opts,multi=/\s/.test(w.w.trim()),g=o.game||'mixed',diff=o.difficulty||'mix';
  if(g==='recognition')return 'mcq';
  if(g==='listening')return 'listen';
  if(g==='typing')return multi?'mcq':'type';
  let kinds;
  if(diff==='rec')kinds=['mcq','listen'];
  else if(diff==='type')kinds=multi?['mcq','listen']:['type','dict'];
  else kinds=multi?['mcq','listen']:['mcq','type','listen','dict'];
  return kinds[Math.floor(Math.random()*kinds.length)];
}
function resolveDir(d){return (d==='en2he'||d==='he2en')?d:(Math.random()>0.5?'en2he':'he2en');}
function renderSessQ(){
  const b=document.getElementById('pracBody');b.innerHTML='';SESS.locked=false;
  if(SESS.idx>=SESS.queue.length)return sessResults();
  const head=mk('div','sess-head anim-slideDown');
  head.innerHTML=`<button class="sess-x">✕</button><div class="sess-prog"><div class="sess-prog-fill" style="width:${SESS.idx/SESS.queue.length*100}%"></div></div><div class="sess-sc">✓ ${SESS.right}</div>`;
  b.appendChild(head);head.querySelector('.sess-x').onclick=showPracHub;
  const w=SESS.queue[SESS.idx],kind=pickKind(w);
  if(kind==='mcq')renderMCQ(w,resolveDir(SESS.opts.direction),b);
  else if(kind==='type')renderTypeQ(w,b);
  else if(kind==='listen')renderListenQ(w,b);
  else renderDictQ(w,b);
}
function sessNext(w,ok,b){
  srsRecord(w.w,ok);bumpDailyPractice();SESS.results.push({w,ok});
  if(ok){SESS.right++;LS.xp+=5;sLS();SFX.play('correct');showCorrectBurst();}
  else{SESS.wrong++;SFX.play('wrong');(LS.sessionMistakes=LS.sessionMistakes||[]).push(w.w);}
  SESS.idx++;
  const nb=mk('button','act-btn go anim-slideUp','הבאה ←');nb.onclick=renderSessQ;b.appendChild(nb);
}
function renderMCQ(w,dir,b){
  const en2he=dir==='en2he';
  const distract=shuf(SESS.pool.filter(x=>x.w.toLowerCase()!==w.w.toLowerCase())).slice(0,3);
  const correct=en2he?w.he:w.w.toLowerCase();
  const opts=shuf([w,...distract]).map(x=>({txt:en2he?x.he:x.w.toLowerCase(),ok:x.w.toLowerCase()===w.w.toLowerCase()}));
  const prompt=en2he?`<div style="font-size:46px">${w.em||'📝'}</div><div class="sess-q-en">${w.w.toLowerCase()} 🔊</div><div class="sess-q-phon">${w.phon||''}</div>`:`<div style="font-size:30px;font-weight:800;color:#5838fa">${w.he}</div>`;
  const card=mk('div','card center anim-slideUp',prompt);b.appendChild(card);
  if(en2he){const q=card.querySelector('.sess-q-en');if(q)q.onclick=()=>speak(w.w);speak(w.w);}
  const g=mk('div','mcq-opts anim-slideUp');
  opts.forEach(o=>{const bt=mk('button','mcq-opt');bt.textContent=o.txt;bt.onclick=()=>{if(SESS.locked)return;SESS.locked=true;g.querySelectorAll('button').forEach(x=>x.disabled=true);bt.classList.add(o.ok?'ok':'no');if(!o.ok)g.querySelectorAll('button').forEach(x=>{if(x.textContent===correct)x.classList.add('ok');});if(!en2he)speak(w.w);sessNext(w,o.ok,b);};g.appendChild(bt);});
  b.appendChild(g);
}
function sessTypeCard(w,b,prompt){
  const card=mk('div','card center anim-slideUp',prompt+`<div class="write-input-row" style="margin-top:8px"><input class="write-input" dir="ltr" id="sI" placeholder="?" autocomplete="off" autocapitalize="off" spellcheck="false" style="font-size:18px;letter-spacing:2px"/><button class="write-check-btn" id="sC">✓</button></div><div class="write-attempts" id="sA"></div>`);
  b.appendChild(card);let attempts=0;const inp=card.querySelector('#sI'),btn=card.querySelector('#sC');
  const finish=ok=>{inp.disabled=true;btn.disabled=true;sessNext(w,ok,b);};
  const check=()=>{if(!inp.value.trim())return;if(inp.value.trim().toLowerCase()===w.w.toLowerCase()){inp.classList.add('ok-inp');LS.writes++;sLS();speak(w.w);finish(true);}else{attempts++;card.querySelector('#sA').textContent='❌ '+attempts+(attempts>=2?' — '+w.w.toLowerCase():'');inp.classList.add('no-inp');setTimeout(()=>{inp.classList.remove('no-inp');inp.value='';inp.focus();},600);if(attempts>=3)finish(false);}};
  btn.onclick=check;inp.addEventListener('keydown',e=>{if(e.key==='Enter')check();});
  return {card,inp};
}
function renderTypeQ(w,b){sessTypeCard(w,b,`<div style="font-size:42px">${w.em||'📝'}</div><div style="font-size:22px;font-weight:800;color:#5838fa;margin:4px 0">${w.he}</div><div class="sess-q-phon">${w.phon||''}</div>`);setTimeout(()=>{const i=document.getElementById('sI');if(i)i.focus();},100);}

// Pool of EVERY word the child has learned — letters (started), topics, and phrases.
function allLearnedWords(){
  const map={};
  LETTERS.forEach((lt,i)=>{if(getDone(i)>0)[{w:lt.word,phon:lt.wPhon,he:lt.wHe,em:lt.wEm},...lt.more].forEach(x=>{const k=x.w.toLowerCase();if(!map[k])map[k]={w:x.w,phon:x.phon,he:x.he,em:x.em};});});
  Object.values(LS.learnedWords||{}).forEach(x=>{if(x&&x.w&&x.he){const k=x.w.toLowerCase();if(!map[k])map[k]={w:x.w,phon:x.phon||'',he:x.he,em:x.em||'📝'};}});
  return Object.values(map);
}

    if(!sel){sel=el;el.classList.add('match-on');SFX.play('click');return;}
    const other=sel;sel=null;other.classList.remove('match-on');
    if(other.dataset.key===key){other.classList.add('match-done');el.classList.add('match-done');SFX.play('correct');speak(en);srsRecord(key,true);matched++;

    }else{srsRecord(other.dataset.key,false);SFX.play('wrong');other.classList.add('match-bad');el.classList.add('match-bad');setTimeout(()=>{other.classList.remove('match-bad');el.classList.remove('match-bad');},600);}

function showSentenceBuilder(){

  let sents=[];
  PHRASES.forEach(p=>{if(getPDone(p.id)>0||LS.settings.devMode)p.items.forEach(it=>{if(/\s/.test(it.en.trim()))sents.push({en:it.en.trim(),he:it.he});});});
  STORIES.forEach(s=>{if(getSDone(s.id)>0||LS.settings.devMode)s.lines.forEach(l=>{if(/\s/.test(l.en.trim()))sents.push({en:l.en.trim(),he:l.he});});});
  if(sents.length<3)PHRASES.forEach(p=>p.items.forEach(it=>{if(/\s/.test(it.en.trim()))sents.push({en:it.en.trim(),he:it.he});}));

  sents=shuf(sents);let qi=0,total=Math.min(6,sents.length),score=0;

    const s=sents[qi],words=s.en.replace(/\s+/g,' ').split(' '),chips=shuf(words.map((w,i)=>({w,i})));let placed=[];
    area.innerHTML='';
    area.appendChild(mk('div','mcq-prompt',`🧱 ${qi+1}/${total}`));
    area.appendChild(mk('div','sb-he',s.he));
    const slots=mk('div','sb-slots');area.appendChild(slots);
    const bank=mk('div','sb-bank');area.appendChild(bank);
    const sp=mk('button','act-btn soft','🔊 שמע');sp.onclick=()=>speak(s.en);area.appendChild(sp);
    function render(){
      slots.innerHTML='';bank.innerHTML='';
      if(!placed.length)slots.appendChild(mk('div','sb-empty','👇 הרכב את המשפט'));
      placed.forEach((p,pi)=>{const el=mk('div','sb-chip placed',p.w);el.onclick=()=>{placed.splice(pi,1);render();};slots.appendChild(el);});
      chips.forEach(ch=>{const used=placed.some(p=>p.i===ch.i);const el=mk('div','sb-chip'+(used?' used':''),ch.w);if(!used)el.onclick=()=>{placed.push(ch);SFX.play('click');if(placed.length===words.length)check();else render();};bank.appendChild(el);});
    }
    function check(){
      render();
      if(placed.map(p=>p.w).join(' ')===words.join(' ')){score++;SFX.play('correct');speak(s.en);slots.querySelectorAll('.sb-chip').forEach(c=>c.classList.add('ok'));qi++;setTimeout(nextQ,950);}
      else{SFX.play('wrong');slots.querySelectorAll('.sb-chip').forEach(c=>c.classList.add('bad'));setTimeout(()=>{placed=[];render();},800);}
    }
    render();
  }

// ══ SMART MEMORY (SRS) ══
function srsRecord(word,correct){word=word.toLowerCase();if(!LS.srs[word])LS.srs[word]={c:0,w:0,last:0,next:0,ease:2.5};const s=LS.srs[word];s.last=Date.now();if(correct){s.c++;s.ease=Math.min(4,s.ease+0.1);s.next=Date.now()+Math.min(Math.pow(s.ease,s.c)*3600000,7*86400000);}else{s.w++;s.ease=Math.max(1.3,s.ease-0.2);s.next=Date.now()+600000;}sLS();}
function getWeakWords(n=5){const now=Date.now();return Object.entries(LS.srs).filter(([k,v])=>v.next<=now||v.w>v.c).sort((a,b)=>(a[1].c/(a[1].c+a[1].w+1))-(b[1].c/(b[1].c+b[1].w+1))).slice(0,n).map(([k])=>k);}
function getWordScore(word){const s=LS.srs[word.toLowerCase()];if(!s)return 0;return Math.round(s.c/(s.c+s.w+1)*100);}

// ══ BILINGUAL TTS ══
let bilQ=[],bilPlaying=false,bilIdx=0;
function playBilingual(lines,lineEls){if(bilPlaying){stopBil();return;}bilQ=lines;bilIdx=0;bilPlaying=true;playBilNext(lineEls);}
async function playBilNext(els){
  if(!bilPlaying||bilIdx>=bilQ.length){stopBil();return;}
  const l=bilQ[bilIdx];els.forEach((e,i)=>{e.classList.toggle('active',i===bilIdx);});
  const rate=(LS.settings&&LS.settings.ttsSpeed)||0.72;
  const TTS=IS_NATIVE&&window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.TextToSpeech;
  if(TTS){
    try{
      await TTS.speak({text:l.en,lang:'en-US',rate});
      if(!bilPlaying)return;
      await new Promise(r=>setTimeout(r,300));
      await TTS.speak({text:l.he,lang:'he-IL',rate:0.85});
      if(!bilPlaying)return;
      bilIdx++;await new Promise(r=>setTimeout(r,400));
      playBilNext(els);return;
    }catch(e){}
  }
  if(!window.speechSynthesis)return;
  const en=new SpeechSynthesisUtterance(l.en);en.lang='en-US';en.rate=rate;
  en.onend=()=>{setTimeout(()=>{const he=new SpeechSynthesisUtterance(l.he);he.lang='he-IL';he.rate=0.85;he.onend=()=>{bilIdx++;setTimeout(()=>playBilNext(els),400);};speechSynthesis.speak(he);},300);};
  speechSynthesis.speak(en);
}

    if(step===0){// Intro - show all words
      b.appendChild(mk('div','mcq-prompt anim-slideUp',`${th.emoji} ${th.title}`));
      th.words.forEach((w,i)=>{const d=mk('div','listen-item anim-slideUp');d.style.animationDelay=i*.06+'s';d.innerHTML=`<div class="li-em">${w.em}</div><div class="li-body"><div class="li-en">${w.w}</div><div class="li-phon">${w.phon}</div><div class="li-he">${w.he}</div></div><div class="li-spk">🔊</div>`;d.onclick=()=>{speak(w.w);SFX.play('click');};b.appendChild(d);});
      const nb=mk('button','act-btn go anim-slideUp','למבחן! ←');nb.onclick=()=>{step=1;renderThStep();};b.appendChild(nb);
    }else if(step<=th.words.length){// MCQ for each word
      const w=th.words[step-1];const wrong=shuf(th.words.filter(x=>x.w!==w.w)).slice(0,3);const opts=shuf([w,...wrong]);
      b.appendChild(mk('div','card center anim-slideUp',`<div style="font-size:20px;font-weight:700;margin-bottom:4px">${w.he}</div><div style="font-size:40px">${w.em}</div><div style="font-size:12px;color:#aaa;margin-top:4px">${step}/${th.words.length}</div>`));
      const g=mk('div','mcq-opts anim-slideUp');let done=false;
      opts.forEach(o=>{const bt=mk('button','mcq-opt');bt.innerHTML=`<span class="opt-en">${o.w}</span><span class="opt-phon">${o.phon}</span>`;bt.onclick=()=>{if(done)return;done=true;g.querySelectorAll('button').forEach(x=>x.disabled=true);const ok=o.w===w.w;bt.classList.add(ok?'ok':'no');if(!ok)g.querySelectorAll('button').forEach(x=>{if(x.querySelector('.opt-en').textContent===w.w)x.classList.add('ok');});srsRecord(w.w,ok);if(ok){SFX.play('correct');LS.xp+=5;sLS();}else SFX.play('wrong');
        // Add to learned words
        if(!LS.learnedWords[w.w.toLowerCase()])LS.learnedWords[w.w.toLowerCase()]={w:w.w,phon:w.phon,he:w.he,em:w.em,ts:Date.now()};sLS();
        const nb=mk('button','act-btn go anim-slideUp','הבאה ←');nb.onclick=()=>{step++;renderThStep();};b.appendChild(nb);};g.appendChild(bt);});
      b.appendChild(g);
    }else{// Done
      LS.themesDone=(LS.themesDone||0)+1;sLS();checkAchievements();
      b.innerHTML=`<div style="text-align:center;padding:24px;"><div style="font-size:56px">${th.emoji}</div><div style="font-size:18px;font-weight:700;color:#5838fa;margin:8px 0">סיימת: ${th.title}!</div><div style="font-size:14px;color:#888">+${th.words.length*5} XP</div><button class="act-btn go" onclick="showThemes()" style="margin-top:12px">נושאים נוספים 🌍</button></div>`;
    }
  }
  renderThStep();
}

// ══ REVIEW SESSION (after game over) ══
function startReviewSession(words){
  if(!words.length){showHome();return;}
  sw('scLesson');document.getElementById('lTitle').textContent='📝 חזרה על טעויות';
  curStep=0;hearts=3;mistakes=0;stepDone=false;isPhrase=false;isDailyChallenge=false;
  const allLearned=Object.values(LS.learnedWords);
  const reviewSteps=words.map(w=>{
    const wdata=allLearned.find(x=>x.w.toLowerCase()===w.toLowerCase())||{w,phon:'',he:'?',em:'📝'};
    const dist=shuf(allLearned.filter(x=>x.w.toLowerCase()!==w.toLowerCase())).slice(0,3);
    return {type:'review_mcq',target:wdata,dist};
  });
  let rIdx=0;
  function renderReview(){
    if(rIdx>=reviewSteps.length){showHome();toast('✅ חזרה הושלמה! לבבות חזרו');return;}
    const body=document.getElementById('lesBody');body.innerHTML='';stepDone=false;
    const rs=reviewSteps[rIdx];
    document.getElementById('lStep').textContent=(rIdx+1)+'/'+reviewSteps.length;
    document.getElementById('lProgFill').style.width=(rIdx/reviewSteps.length*100)+'%';
    body.appendChild(mk('div','card center anim-slideUp',`<div style="font-size:48px">${rs.target.em}</div><div style="font-size:14px;color:#888;margin-top:4px">${rs.target.he}</div><div style="font-size:12px;color:#a855f7">${rs.target.phon||''}</div>`));
    const opts=shuf([rs.target,...rs.dist]);
    const g=mk('div','mcq-opts anim-slideUp');
    opts.forEach(o=>{const bt=mk('button','mcq-opt');bt.innerHTML=`<span class="opt-en">${o.w}</span>`;bt.onclick=()=>{if(stepDone)return;stepDone=true;g.querySelectorAll('button').forEach(x=>x.disabled=true);const ok=o.w.toLowerCase()===rs.target.w.toLowerCase();bt.classList.add(ok?'ok':'no');if(!ok)g.querySelectorAll('button').forEach(x=>{if(x.querySelector('.opt-en').textContent===rs.target.w)x.classList.add('ok');});srsRecord(rs.target.w,ok);if(ok)SFX.play('correct');else SFX.play('wrong');
      const nb=mk('button','act-btn go anim-slideUp','הבאה ←');nb.onclick=()=>{rIdx++;renderReview();};body.appendChild(nb);};g.appendChild(bt);});
    body.appendChild(g);
  }
  renderReview();
}
